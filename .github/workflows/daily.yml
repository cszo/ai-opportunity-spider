name: Daily AI Opportunity Spider

on:
  schedule:
    # UTC 08:00 = Beijing 16:00
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run spider
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ZHIPU_MODEL: ${{ secrets.ZHIPU_MODEL }}
          ZHIPU_BASE_URL: ${{ secrets.ZHIPU_BASE_URL }}
        run: python main.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "daily report $(date -u +%Y-%m-%d)"
          git push
